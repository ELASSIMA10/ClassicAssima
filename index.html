<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASS1C El Assima</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Graduate&family=Alex+Brush&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json?v=22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ClassicAssima">
    <link rel="apple-touch-icon" href="icon_v21.jpeg">
</head>
<body>
    <div class="app-layout">
        
        <!-- GAUCHE : Playlist Centrale -->
        <main class="content-area">
            <header class="site-header">
                <div class="logo-text-main">
                    <span class="logo-classic">CLASS1C</span>
                    <span class="logo-assima">El Assima</span>
                </div>
            </header>

            <div class="large-playlist-container">
                <h2 class="large-playlist-title">🎵 Playlist Officielle</h2>
                <ul id="playlist" class="playlist large-playlist">
                    <li class="playlist-empty">Aucune musique chargée</li>
                </ul>
            </div>
        </main>

        <!-- DROITE : Le Lecteur de Musique -->
        <aside class="sidebar-player">
            <div class="player-container">
                <div class="album-art-container">
                    <div class="album-art" id="albumArt">
                        <div class="music-note">🎵</div>
                    </div>
                </div>

                <div class="track-info">
                    <h1 id="trackTitle">Sélectionnez une musique</h1>
                    <p id="trackArtist">CLASS1C El Assima</p>
                </div>

                <div class="progress-container">
                    <span id="currentTime">0:00</span>
                    <input type="range" id="progressBar" min="0" max="100" value="0">
                    <span id="duration">0:00</span>
                </div>

                <div class="controls">
                    <button class="btn-control" id="loopBtn" title="Boucler la chanson">
                        <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                    </button>
                    <button class="btn-control" id="prevBtn">
                        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button class="btn-play" id="playBtn">
                        <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="btn-control" id="nextBtn">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>
                
                <div class="file-loader">
                    <label for="audioUpload" class="upload-btn">
                        <span>AJOUTER DES MUSIQUES</span>
                    </label>
                    <input type="file" id="audioUpload" accept="audio/*" multiple style="display: none;">
                </div>
            </div>
        </aside>

    </div>

    <!-- Élément audio masqué -->
    <audio id="mainAudio" playsinline preload="auto"></audio>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw_v22.js?v=22')
                .then(registration => console.log('SW registered'))
                .catch(err => console.log('SW failed', err));
            });
        }
    </script>
    <script src="app.js?v=22"></script>
</body>
</html>
